<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:400px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        #message{
            margin-top:15px;
            text-align:center;
            font-weight:bold;
        }

        a{
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Login</h2>

    <input
        type="email"
        id="email"
        placeholder="Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button onclick="loginUser()">
        Login
    </button>

    <p style="text-align:center;margin-top:15px;">
        Don't have an account?
        <a href="register.html">Register</a>
    </p>

    <div id="message"></div>

</div>

<script>

async function loginUser(){

    const payload = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    try{

        const response = await fetch(
            "http://127.0.0.1:8000/login",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify(payload)
            }
        );

        const data = await response.json();

        if(response.ok){

            localStorage.setItem(
                "token",
                data.access_token
            );

            document.getElementById("message").innerHTML =
                "Login Successful!";

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);

        }else{

            document.getElementById("message").innerHTML =
                data.detail || "Login Failed";

        }

    }catch(error){

        document.getElementById("message").innerHTML =
            "Server Error";

        console.error(error);
    }
}

</script>

</body>
</html>
